name: Playwright E2E

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "tests/e2e/**"
      - "playwright.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/e2e.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: e2e-placeholder-secret-value
      MONGODB_URI: mongodb://127.0.0.1:27017/bacardi-ticket-hub
      SUPER_ADMIN_EMAILS: e2e.admin@example.com
      ADMIN_NOTIFY_EMAILS: e2e.admin@example.com
      MAIL_FROM: Bacardi Ticket Hub <tickets@example.com>

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
