name: Production Smoke

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Production or preview URL to smoke test"
        required: true
        type: string
  deployment_status:

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.event.deployment_status.environment_url || github.event.deployment_status.target_url || inputs.url }}
  cancel-in-progress: true

jobs:
  smoke:
    if: github.event_name == 'workflow_dispatch' || github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke test deployment
        run: npm run smoke:production
        env:
          SMOKE_URL: ${{ github.event.deployment_status.environment_url || github.event.deployment_status.target_url || inputs.url }}
