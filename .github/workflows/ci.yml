name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check
        env:
          # Build-time placeholders; real values are provided at runtime.
          NEXTAUTH_SECRET: ci-placeholder-secret-value
          MONGODB_URI: mongodb://localhost:27017/ci
          SUPER_ADMIN_EMAILS: ci@example.com
